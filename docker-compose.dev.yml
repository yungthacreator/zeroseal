services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zeroseal
      POSTGRES_USER: zeroseal
      POSTGRES_PASSWORD: zeroseal_dev_password
    ports:
      - "5432:5432"
    volumes:
      - zeroseal_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeroseal -d zeroseal"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  zeroseal_postgres:
